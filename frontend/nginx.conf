server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Basic auth — htpasswd mounted in by docker-compose. Realm chosen to match
    # platform conventions so browsers don't re-prompt when switching tabs.
    auth_basic "OpusLogic Pulse";
    auth_basic_user_file /etc/nginx/htpasswd;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://collector:7500;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Health endpoint bypasses auth — Cloudflare tunnel uses it to verify origin.
    location = /healthz {
        auth_basic off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
