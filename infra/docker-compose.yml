services:
  collector:
    build: ../collector
    container_name: pulse_collector
    restart: unless-stopped
    environment:
      PULSE_DB_PATH: /data/pulse.duckdb
      PULSE_POLL_INTERVAL: "10"
      PULSE_RETENTION_DAYS: "90"
      PULSE_BACKEND_URL: ${PULSE_BACKEND_URL:-https://backend:7443}
      PULSE_ZITADEL_URL: ${PULSE_ZITADEL_URL:-http://zitadel:8080}
      PULSE_TEMPORAL_URL: ${PULSE_TEMPORAL_URL:-temporal-server:7233}
      PULSE_POSTGRES_DSN: ${PULSE_POSTGRES_DSN}
      PULSE_PROC_PATH: /host/proc
      PULSE_SYS_PATH: /host/sys
      OIDC_ISSUER: ${OIDC_ISSUER}
      OIDC_JWKS_URI: ${OIDC_JWKS_URI}
      OIDC_PROJECT_ID: ${OIDC_PROJECT_ID}
    volumes:
      - pulse_data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    networks:
      - opuslogic_default

  frontend:
    build:
      context: ../frontend
      args:
        VITE_OIDC_AUTHORITY: ${VITE_OIDC_AUTHORITY}
        VITE_OIDC_CLIENT_ID: ${VITE_OIDC_CLIENT_ID}
    container_name: pulse_frontend
    restart: unless-stopped
    depends_on:
      - collector
    networks:
      - opuslogic_default

  caddy:
    image: caddy:2.8-alpine
    container_name: pulse_caddy
    restart: unless-stopped
    depends_on:
      - frontend
    environment:
      LE_EMAIL: ${LE_EMAIL:-ali@opuslogic.eu}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - opuslogic_default

volumes:
  pulse_data:
  caddy_data:
  caddy_config:

networks:
  opuslogic_default:
    external: true
