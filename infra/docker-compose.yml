# Pulse stack — collector + frontend only.
#
# TLS + public ingress is handled by the platform's existing Caddy (running in
# the main automation-platform compose), which reverse-proxies pulse.opuslogic.eu
# to our frontend container. We join the same network so Caddy can reach us.
services:
  collector:
    build: ../collector
    container_name: pulse_collector
    restart: unless-stopped
    environment:
      PULSE_DB_PATH: /data/pulse.duckdb
      PULSE_POLL_INTERVAL: "10"
      PULSE_RETENTION_DAYS: "90"
      PULSE_BACKEND_URL: ${PULSE_BACKEND_URL:-https://opuslogic_backend:443}
      PULSE_ZITADEL_URL: ${PULSE_ZITADEL_URL:-http://opuslogic_zitadel:8080}
      PULSE_TEMPORAL_URL: ${PULSE_TEMPORAL_URL:-opuslogic_temporal_server:7233}
      PULSE_POSTGRES_DSN: ${PULSE_POSTGRES_DSN}
      PULSE_PROC_PATH: /host/proc
      PULSE_SYS_PATH: /host/sys
      # R10.1-PLAT security probe — platform posture dashboard. Base URL
      # used for ingress-surface + TLS + agent-binary-signed checks.
      PULSE_PLATFORM_URL: ${PULSE_PLATFORM_URL:-https://dev.opuslogic.eu}
      PULSE_PLATFORM_HOST_ROOT: /host
      OIDC_ISSUER: ${OIDC_ISSUER}
      OIDC_JWKS_URI: ${OIDC_JWKS_URI}
      OIDC_PROJECT_ID: ${OIDC_PROJECT_ID}
    volumes:
      - pulse_data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      # R10.1-PLAT: read-only host mounts for the security probe.
      # The probe inspects mode/owner/age — never reads .env contents.
      - /opt/backups:/host/opt/backups:ro
      - /opt/opuslogic:/host/opt/opuslogic:ro
      - /etc/opuslogic:/host/etc/opuslogic:ro
    networks:
      - opuslogic-network

  frontend:
    build:
      context: ../frontend
      args:
        VITE_OIDC_AUTHORITY: ${VITE_OIDC_AUTHORITY}
        VITE_OIDC_CLIENT_ID: ${VITE_OIDC_CLIENT_ID}
    container_name: pulse_frontend
    restart: unless-stopped
    depends_on:
      - collector
    networks:
      - opuslogic-network

volumes:
  pulse_data:

networks:
  opuslogic-network:
    external: true
