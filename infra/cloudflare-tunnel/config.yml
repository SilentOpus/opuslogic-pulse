# Standalone Cloudflare Tunnel config for OpusLogic Pulse.
#
# Prerequisites on the VPS:
#   cloudflared tunnel login
#   cloudflared tunnel create opuslogic-pulse
#   cloudflared tunnel route dns opuslogic-pulse pulse.opuslogic.eu
#
# Fill in tunnel id below, then:
#   cloudflared tunnel --config infra/cloudflare-tunnel/config.yml run

tunnel: REPLACE_WITH_TUNNEL_ID
credentials-file: ~/.cloudflared/REPLACE_WITH_TUNNEL_ID.json

ingress:
  - hostname: pulse.opuslogic.eu
    service: http://localhost:7600
    originRequest:
      # nginx healthz bypasses basic auth so Cloudflare can verify the origin
      # without credentials.
      noHappyEyeballs: false
  - service: http_status:404
